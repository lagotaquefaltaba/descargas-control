<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso a Programas</title>
  <style>
    * {margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif;}
    body {background:#0a0a1a; color:#fff; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px;}
    .caja {background:#15152b; border-radius:16px; padding:30px; width:100%; max-width:420px; border:1px solid rgba(0,210,255,0.2);}
    h2 {text-align:center; color:#00e5ff; margin-bottom:25px;}
    input {width:100%; padding:12px; margin:10px 0; border-radius:8px; border:none; background:#1e1e3f; color:#fff; font-size:16px;}
    button {width:100%; padding:14px; background:#009ee3; border:none; border-radius:8px; color:white; font-weight:bold; cursor:pointer; margin-top:10px; font-size:16px;}
    button:hover {background:#0088cc;}
    .archivo {padding:12px; margin:10px 0; border-radius:8px; background:#1e1e3f; display:flex; justify-content:space-between; align-items:center;}
    .disponible {color:#34d399;}
    .usado {color:#a5a5a5; cursor:not-allowed; opacity:0.7;}
    .mensaje {margin-top:15px; padding:10px; border-radius:6px; text-align:center; font-weight:bold;}
    .ok {background:rgba(52,211,153,0.15); color:#34d399;}
    .error {background:rgba(239,68,68,0.15); color:#ef4444;}
    .cerrar {background:#6b7280; margin-top:20px;}
  </style>
</head>
<body>
  <div class="caja">
    <h2>🔒 Acceso a Programas</h2>
    <div id="login">
      <input type="text" id="usuario" placeholder="Usuario">
      <input type="password" id="clave" placeholder="Contraseña">
      <button onclick="ingresar()">Ingresar</button>
      <div id="msgLogin" class="mensaje" style="display:none;"></div>
    </div>
    <div id="archivos" style="display:none;">
      <h3 style="margin-bottom:15px; color:#00e5ff;">Tus archivos</h3>
      <div id="listaArchivos"></div>
      <button onclick="cerrarSesion()" class="cerrar">Cerrar sesión</button>
    </div>
  </div>

  <script>
    // 🔐 30 USUARIOS LISTOS (no editar nunca)
    const usuarios = {
      "radio1": {clave:"radio123", descargados:{}},
      "radio2": {clave:"radio234", descargados:{}},
      "radio3": {clave:"radio345", descargados:{}},
      "radio4": {clave:"radio456", descargados:{}},
      "radio5": {clave:"radio567", descargados:{}},
      "radio6": {clave:"radio678", descargados:{}},
      "radio7": {clave:"radio789", descargados:{}},
      "radio8": {clave:"radio890", descargados:{}},
      "radio9": {clave:"radio901", descargados:{}},
      "radio10": {clave:"radio1011", descargados:{}},
      "radio11": {clave:"radio1112", descargados:{}},
      "radio12": {clave:"radio1213", descargados:{}},
      "radio13": {clave:"radio1314", descargados:{}},
      "radio14": {clave:"radio1415", descargados:{}},
      "radio15": {clave:"radio1516", descargados:{}},
      "radio16": {clave:"radio1617", descargados:{}},
      "radio17": {clave:"radio1718", descargados:{}},
      "radio18": {clave:"radio1819", descargados:{}},
      "radio19": {clave:"radio1920", descargados:{}},
      "radio20": {clave:"radio2021", descargados:{}},
      "radio21": {clave:"radio2122", descargados:{}},
      "radio22": {clave:"radio2223", descargados:{}},
      "radio23": {clave:"radio2324", descargados:{}},
      "radio24": {clave:"radio2425", descargados:{}},
      "radio25": {clave:"radio2526", descargados:{}},
      "radio26": {clave:"radio2627", descargados:{}},
      "radio27": {clave:"radio2728", descargados:{}},
      "radio28": {clave:"radio2829", descargados:{}},
      "radio29": {clave:"radio2930", descargados:{}},
      "radio30": {clave:"radio3031", descargados:{}}
    };

    // 📂 TU CARPETA DE DROPBOX YA CONFIGURADA
    const CARPETA_DROPBOX = "https://www.dropbox.com/scl/fo/dwho9fx0tbsubmc4xbpo8/AKXZLNYi7x8yCHcfOfXuNTw?rlkey=vkl3y8sprv7e2nxevpkmh48bg&dl=1/";

    let usuarioActual = "";

    function ingresar() {
      const user = document.getElementById("usuario").value.trim();
      const pass = document.getElementById("clave").value.trim();
      const msg = document.getElementById("msgLogin");
      msg.style.display = "none";

      if (!usuarios[user]) return mostrarMsg(msg, "❌ Usuario no existe", "error");
      if (usuarios[user].clave !== pass) return mostrarMsg(msg, "❌ Contraseña incorrecta", "error");

      usuarioActual = user;
      document.getElementById("login").style.display = "none";
      document.getElementById("archivos").style.display = "block";
      cargarArchivos();
    }

    function cargarArchivos() {
      const lista = document.getElementById("listaArchivos");
      lista.innerHTML = "";
      // 📝 AQUÍ PONÉ LOS NOMBRES DE TUS ARCHIVOS (solo agregás o sacás líneas)
      const archivos = [
        "programa_lunes.mp3",
        "programa_martes.mp3",
        "programa_miercoles.mp3"
      ];

      archivos.forEach(nombre => {
        const yaBajo = usuarios[usuarioActual].descargados[nombre] || false;
        const div = document.createElement("div");
        div.className = `archivo ${yaBajo ? "usado" : "disponible"}`;
        div.innerHTML = `
          <span>${nombre.replace(".mp3", "").replace("_", " ").toUpperCase()}</span>
          <button ${yaBajo ? "disabled" : ""} onclick="descargar('${nombre}')">
            ${yaBajo ? "✅ Ya descargado" : "⬇️ Descargar"}
          </button>
        `;
        lista.appendChild(div);
      });
    }

    function descargar(nombreArchivo) {
      usuarios[usuarioActual].descargados[nombreArchivo] = true;
      window.open(`${CARPETA_DROPBOX}${nombreArchivo}`, "_blank");
      cargarArchivos();
    }

    function cerrarSesion() {
      usuarioActual = "";
      document.getElementById("login").style.display = "block";
      document.getElementById("archivos").style.display = "none";
      document.getElementById("usuario").value = "";
      document.getElementById("clave").value = "";
    }

    function mostrarMsg(el, texto, tipo) {
      el.textContent = texto;
      el.className = `mensaje ${tipo}`;
      el.style.display = "block";
    }
  </script>
</body>
</html>
