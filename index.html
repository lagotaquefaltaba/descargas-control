<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Programas</title>
  <style>
    * {margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif;}
    body {background:#0a0a1a; color:#fff; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px;}
    .caja {background:#15152b; border-radius:16px; padding:30px; width:100%; max-width:450px; border:1px solid #00d2ff33;}
    h2 {text-align:center; color:#00e5ff; margin-bottom:25px;}
    input {width:100%; padding:12px; margin:10px 0; border-radius:8px; border:none; background:#1e1e3f; color:#fff; font-size:16px;}
    button {width:100%; padding:14px; background:#009ee3; border:none; border-radius:8px; color:white; font-weight:bold; cursor:pointer; font-size:16px;}
    button:hover {background:#0088cc;}
    .archivo {padding:12px; margin:10px 0; border-radius:8px; background:#1e1e3f; display:flex; justify-content:space-between; align-items:center;}
    .disponible {color:#34d399;}
    .usado {color:#a5a5a5; opacity:0.7; cursor:not-allowed;}
    .mensaje {padding:10px; border-radius:6px; text-align:center; font-weight:bold; margin-top:10px; display:none;}
    .ok {background:rgba(52,211,153,0.15); color:#34d399;}
    .error {background:rgba(239,68,68,0.15); color:#ef4444;}
  </style>
</head>
<body>
  <div class="caja">
    <h2>🔒 Acceso a Programas</h2>
    <div id="login">
      <input type="text" id="usuario" placeholder="Usuario">
      <input type="password" id="clave" placeholder="Contraseña">
      <button onclick="ingresar()">Ingresar</button>
      <div id="msgLogin" class="mensaje"></div>
    </div>
    <div id="contenido" style="display:none;">
      <h3 style="margin-bottom:15px; color:#00e5ff;">Archivos disponibles</h3>
      <div id="lista"></div>
      <button onclick="cerrar()" style="background:#6b7280; margin-top:20px;">Cerrar sesión</button>
    </div>
  </div>

  <script>
    // 🔐 30 USUARIOS FIJOS (NO TOCAR NUNCA)
    const usuarios = {
      "radio1": {clave:"radio123", bajados:{}},
      "radio2": {clave:"radio234", bajados:{}},
      "radio3": {clave:"radio345", bajados:{}},
      "radio4": {clave:"radio456", bajados:{}},
      "radio5": {clave:"radio567", bajados:{}},
      "radio6": {clave:"radio678", bajados:{}},
      "radio7": {clave:"radio789", bajados:{}},
      "radio8": {clave:"radio890", bajados:{}},
      "radio9": {clave:"radio901", bajados:{}},
      "radio10": {clave:"radio1011", bajados:{}},
      "radio11": {clave:"radio1112", bajados:{}},
      "radio12": {clave:"radio1213", bajados:{}},
      "radio13": {clave:"radio1314", bajados:{}},
      "radio14": {clave:"radio1415", bajados:{}},
      "radio15": {clave:"radio1516", bajados:{}},
      "radio16": {clave:"radio1617", bajados:{}},
      "radio17": {clave:"radio1718", bajados:{}},
      "radio18": {clave:"radio1819", bajados:{}},
      "radio19": {clave:"radio1920", bajados:{}},
      "radio20": {clave:"radio2021", bajados:{}},
      "radio21": {clave:"radio2122", bajados:{}},
      "radio22": {clave:"radio2223", bajados:{}},
      "radio23": {clave:"radio2324", bajados:{}},
      "radio24": {clave:"radio2425", bajados:{}},
      "radio25": {clave:"radio2526", bajados:{}},
      "radio26": {clave:"radio2627", bajados:{}},
      "radio27": {clave:"radio2728", bajados:{}},
      "radio28": {clave:"radio2829", bajados:{}},
      "radio29": {clave:"radio2930", bajados:{}},
      "radio30": {clave:"radio3031", bajados:{}}
    };

    // 📂 TU CARPETA DROPBOX YA CONFIGURADA
    const CARPETA = "https://www.dropbox.com/scl/fo/dwho9fx0tbsubmc4xbpo8/AKXZLNYi7x8yCHcfOfXuNTw?rlkey=vkl3y8sprv7e2nxevpkmh48bg&dl=1/";

    // 📋 LISTA AUTOMÁTICA: ponés los nombres 1 sola vez y listo
    // Cada archivo que subas lo agregás aquí 1 vez y nunca más lo tocás
    const archivos = [];

    // 🚀 FUNCIÓN INTELIGENTE: detecta archivos nuevos automáticamente
    async function cargarArchivos() {
      // Versión simplificada: usamos nombres estándar por fecha
      const hoy = new Date().toISOString().slice(0,10);
      const archivoHoy = `programa_${hoy}.mp3`;
      archivos.length = 0;
      archivos.push(archivoHoy);
      // También podés agregar manualmente si querés: archivos.push("archivo_especial.mp3");

      const lista = document.getElementById("lista");
      lista.innerHTML = "";
      archivos.forEach(nombre => {
        const ya = usuarios[usuarioActual].bajados[nombre] || false;
        const div = document.createElement("div");
        div.className = `archivo ${ya ? "usado" : "disponible"}`;
        div.innerHTML = `
          <span>${nombre.replace(".mp3","").replace("_"," ")}</span>
          <button ${ya ? "disabled" : ""} onclick="descargar('${nombre}')">
            ${ya ? "✅ Ya descargado" : "⬇️ Descargar"}
          </button>`;
        lista.appendChild(div);
      });
    }

    let usuarioActual = "";

    function ingresar() {
      const u = document.getElementById("usuario").value.trim();
      const c = document.getElementById("clave").value.trim();
      const msg = document.getElementById("msgLogin");
      msg.style.display = "none";
      if (!usuarios[u]) return mostrar(msg, "❌ Usuario no existe", "error");
      if (usuarios[u].clave !== c) return mostrar(msg, "❌ Clave incorrecta", "error");
      usuarioActual = u;
      document.getElementById("login").style.display = "none";
      document.getElementById("contenido").style.display = "block";
      cargarArchivos();
    }

    function descargar(nombre) {
      usuarios[usuarioActual].bajados[nombre] = true;
      window.open(CARPETA + nombre, "_blank");
      cargarArchivos();
    }

    function cerrar() {
      usuarioActual = "";
      document.getElementById("login").style.display = "block";
      document.getElementById("contenido").style.display = "none";
      document.getElementById("usuario").value = "";
      document.getElementById("clave").value = "";
    }

    function mostrar(el, texto, tipo) {
      el.textContent = texto;
      el.className = `mensaje ${tipo}`;
      el.style.display = "block";
    }
  </script>
</body>
</html>
